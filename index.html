<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wine Label WebAR</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <a-scene
      id="arScene"
      mindar-image="imageTargetSrc: https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiScanning: no; uiLoading: no"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
      class="ar-scene hidden"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="targetEntity" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <main class="overlay-shell">
      <section class="panel start-panel" id="startPanel">
        <p class="eyebrow">Wine Label AR</p>
        <h1>Включи камеру и отсканируй этикетку</h1>
        <p class="lead">
          После распознавания ты увидишь интерактивный контент, привязанный к
          конкретному вину.
        </p>
        <button class="primary-btn" id="startScanButton">
          Включить камеру
        </button>
      </section>

      <section class="scan-hud hidden" id="scanHud">
        <p>Наведи камеру на винную этикетку</p>
        <div class="scanner-frame" aria-hidden="true"></div>
      </section>

      <section class="success-overlay hidden" id="successOverlay">
        <p>Well done!</p>
      </section>

      <section class="panel content-panel hidden" id="contentPanel">
        <p class="eyebrow" id="wineSubtitle"></p>
        <h2 id="wineTitle"></h2>
        <p id="wineStory"></p>
        <p class="meta" id="wineServing"></p>
        <div class="pairings" id="pairings"></div>
        <div class="gallery" id="gallery"></div>
        <button class="ghost-btn" id="rescanButton">Сканировать снова</button>
      </section>
    </main>
  </body>
</html>
