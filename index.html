<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wine Label WebAR</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <a-scene
      id="arScene"
      mindar-image="imageTargetSrc: https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiScanning: no; uiLoading: no"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights, alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      class="ar-scene hidden"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
        <a-entity
          id="labelOutline"
          visible="false"
          position="0 0 0.01"
          animation__pulse="property: scale; from: 1 1 1; to: 1.03 1.03 1; dir: alternate; dur: 360; loop: true; easing: easeInOutSine"
        >
          <a-plane
            id="labelGlowFill"
            width="1"
            height="1"
            material="shader: flat; color: #dcefff; opacity: 0.08; transparent: true; side: double"
          ></a-plane>

          <a-plane
            width="1.08"
            height="0.03"
            position="0 0.515 -0.001"
            material="shader: flat; color: #c6e9ff; opacity: 0.22; transparent: true"
            animation__glowtop="property: material.opacity; from: 0.14; to: 0.3; dir: alternate; dur: 420; loop: true"
          ></a-plane>
          <a-plane
            width="1.08"
            height="0.03"
            position="0 -0.515 -0.001"
            material="shader: flat; color: #c6e9ff; opacity: 0.22; transparent: true"
            animation__glowbottom="property: material.opacity; from: 0.14; to: 0.3; dir: alternate; dur: 420; loop: true"
          ></a-plane>
          <a-plane
            width="0.03"
            height="1.08"
            position="-0.515 0 -0.001"
            material="shader: flat; color: #c6e9ff; opacity: 0.22; transparent: true"
            animation__glowleft="property: material.opacity; from: 0.14; to: 0.3; dir: alternate; dur: 420; loop: true"
          ></a-plane>
          <a-plane
            width="0.03"
            height="1.08"
            position="0.515 0 -0.001"
            material="shader: flat; color: #c6e9ff; opacity: 0.22; transparent: true"
            animation__glowright="property: material.opacity; from: 0.14; to: 0.3; dir: alternate; dur: 420; loop: true"
          ></a-plane>

          <a-plane
            width="1.01"
            height="0.008"
            position="0 0.5 0"
            material="shader: flat; color: #ffffff; opacity: 0.95; transparent: true"
          ></a-plane>
          <a-plane
            width="1.01"
            height="0.008"
            position="0 -0.5 0"
            material="shader: flat; color: #ffffff; opacity: 0.95; transparent: true"
          ></a-plane>
          <a-plane
            width="0.008"
            height="1.01"
            position="-0.5 0 0"
            material="shader: flat; color: #ffffff; opacity: 0.95; transparent: true"
          ></a-plane>
          <a-plane
            width="0.008"
            height="1.01"
            position="0.5 0 0"
            material="shader: flat; color: #ffffff; opacity: 0.95; transparent: true"
          ></a-plane>

          <a-entity
            id="labelSweepTrack"
            position="-0.78 -0.66 0.002"
            rotation="0 0 -24"
            animation__sweep="property: position; from: -0.78 -0.66 0.002; to: 0.78 0.66 0.002; dur: 980; dir: alternate; loop: true; easing: easeInOutSine"
          >
            <a-plane
              width="0.23"
              height="1.24"
              material="shader: flat; color: #eef8ff; opacity: 0.1; transparent: true"
            ></a-plane>
            <a-plane
              width="0.13"
              height="1.24"
              material="shader: flat; color: #f4fbff; opacity: 0.22; transparent: true"
            ></a-plane>
            <a-plane
              width="0.06"
              height="1.24"
              material="shader: flat; color: #ffffff; opacity: 0.5; transparent: true"
            ></a-plane>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <main class="overlay-shell">
      <section class="panel start-panel" id="startPanel">
        <p class="eyebrow">Wine Label AR</p>
        <h1>Включи камеру и отсканируй этикетку</h1>
        <p class="lead">
          После распознавания ты увидишь интерактивный контент, привязанный к
          конкретному вину.
        </p>
        <button class="primary-btn" id="startScanButton">
          Включить камеру
        </button>
      </section>

      <section class="scan-hud hidden" id="scanHud">
        <p>Наведи камеру на винную этикетку</p>
        <div class="scanner-frame" aria-hidden="true"></div>
      </section>

      <section class="success-overlay hidden" id="successOverlay">
        <p>Well done!</p>
      </section>

      <section class="panel content-panel hidden" id="contentPanel">
        <p class="eyebrow reveal-item" style="--reveal-order: 0" id="wineSubtitle"></p>
        <h2 class="reveal-item" style="--reveal-order: 1" id="wineTitle"></h2>
        <p class="reveal-item" style="--reveal-order: 2" id="wineStory"></p>
        <p class="meta reveal-item" style="--reveal-order: 3" id="wineServing"></p>
        <section class="reveal-item" style="--reveal-order: 4">
          <p class="section-title">Pairings</p>
          <div class="pairings" id="pairings"></div>
        </section>
        <section class="reveal-item" style="--reveal-order: 5">
          <p class="section-title">Visual Story</p>
          <div class="gallery" id="gallery"></div>
        </section>
        <button class="ghost-btn reveal-item" style="--reveal-order: 6" id="rescanButton">
          Сканировать снова
        </button>
      </section>
    </main>
  </body>
</html>
