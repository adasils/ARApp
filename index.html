<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wine Label WebAR</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <a-scene
      id="arScene"
      mindar-image="imageTargetSrc: https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiScanning: no; uiLoading: no"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights, alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      class="ar-scene hidden"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
        <a-entity
          id="labelOutline"
          visible="false"
          position="0 0 0.01"
          animation__pulse="property: scale; from: 1 1 1; to: 1.03 1.03 1; dir: alternate; dur: 360; loop: true; easing: easeInOutSine"
        >
          <a-plane
            id="labelOutlineFill"
            width="1"
            height="1"
            material="shader: flat; color: #ffffff; opacity: 0.08; transparent: true"
          ></a-plane>
          <a-entity
            line="start: -0.5 0.5 0; end: 0.5 0.5 0; color: #ffffff; opacity: 0.96"
          ></a-entity>
          <a-entity
            line="start: 0.5 0.5 0; end: 0.5 -0.5 0; color: #ffffff; opacity: 0.96"
          ></a-entity>
          <a-entity
            line="start: 0.5 -0.5 0; end: -0.5 -0.5 0; color: #ffffff; opacity: 0.96"
          ></a-entity>
          <a-entity
            line="start: -0.5 -0.5 0; end: -0.5 0.5 0; color: #ffffff; opacity: 0.96"
          ></a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <main class="overlay-shell">
      <section class="panel start-panel" id="startPanel">
        <p class="eyebrow">Wine Label AR</p>
        <h1>Включи камеру и отсканируй этикетку</h1>
        <p class="lead">
          После распознавания ты увидишь интерактивный контент, привязанный к
          конкретному вину.
        </p>
        <button class="primary-btn" id="startScanButton">
          Включить камеру
        </button>
      </section>

      <section class="scan-hud hidden" id="scanHud">
        <p>Наведи камеру на винную этикетку</p>
        <div class="scanner-frame" aria-hidden="true"></div>
      </section>

      <section class="success-overlay hidden" id="successOverlay">
        <p>Well done!</p>
      </section>

      <section class="panel content-panel hidden" id="contentPanel">
        <p class="eyebrow reveal-item" style="--reveal-order: 0" id="wineSubtitle"></p>
        <h2 class="reveal-item" style="--reveal-order: 1" id="wineTitle"></h2>
        <p class="reveal-item" style="--reveal-order: 2" id="wineStory"></p>
        <p class="meta reveal-item" style="--reveal-order: 3" id="wineServing"></p>
        <section class="reveal-item" style="--reveal-order: 4">
          <p class="section-title">Pairings</p>
          <div class="pairings" id="pairings"></div>
        </section>
        <section class="reveal-item" style="--reveal-order: 5">
          <p class="section-title">Visual Story</p>
          <div class="gallery" id="gallery"></div>
        </section>
        <button class="ghost-btn reveal-item" style="--reveal-order: 6" id="rescanButton">
          Сканировать снова
        </button>
      </section>
    </main>
  </body>
</html>
